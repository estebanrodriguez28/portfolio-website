name: Deploy GitHub Pages
 
# Trigger the workflow on pushes to the main branch
on:
  push:
    branches: [ "main" ]
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out your code
      - name: Checkout code
        uses: actions/checkout@v4
 
      # Step 2 (Optional): Build your project (if using a static site generator)
      # Example: If using npm to build (e.g., React, Vue), uncomment below:
      - name: Install dependencies and build
        run: |
          npm install
          npm run build   # This generates files in your custom directory (e.g., /dist)
 
      # Step 3: Deploy your custom directory to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Path to your custom directory (replace `site` with your directory)
          publish_dir: ./public
